# reachy-gemini -- configuration (TRACKED, public repo: NO secrets here)
#
# Secrets live in config.local.yaml (gitignored) or the GEMINI_API_KEY env var.
# Anything in config.local.yaml overrides the matching key here.

gemini:
  # Realtime Live API model. Get a key at https://aistudio.google.com/apikey
  model: "gemini-3.1-flash-live-preview"
  api_key: ""              # leave blank -> read from config.local.yaml or $GEMINI_API_KEY
  voice: "Kore"            # Puck | Kore | Charon | Fenrir | Aoede | Leda | Orus | Zephyr
  # Spoken once on startup (also an audible speaker self-test). Blank to disable.
  greeting: "Say a brief, warm one-sentence hello as Reachy Mini, the little robot."
  # Who the robot is. This is the system instruction sent to Gemini.
  persona: |
    You are Reachy Mini, a small, friendly desk robot with a round head and two
    little antennas. You are curious, warm, and concise. Keep replies short and
    spoken-natural -- a sentence or two -- since you are talking out loud.

# Where the voice goes in and comes out.
#   local  -> this laptop's mic + speakers (sounddevice), no robot motion. For dev.
#   reachy -> the Reachy Mini robot's mic + speaker + head/antenna motion.
body:
  backend: "local"         # local | reachy

audio:
  # The robot mic and Gemini both run at 16 kHz mono. Gemini speaks back at 24 kHz.
  input_rate: 16000
  output_rate: 24000
  chunk_ms: 50             # how often we ship a mic chunk to Gemini

# Live diagram: a web page that moves with what Reachy actually hears & says.
web:
  port: 8080               # open http://<robot-ip>:8080 on the LAN. Blank/0 to disable.
