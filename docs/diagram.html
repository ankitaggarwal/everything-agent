<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>reachy-gemini · pipeline latency profiler</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: #ffffff;
    color: #1a1a1a;
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  /* Header */
  h1 {
    margin: 0 0 8px;
    font-size: 24px;
    font-weight: 600;
    color: #000;
  }
  .header-sub {
    margin: 0 0 24px;
    font-size: 13px;
    color: #666;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #999;
  }
  .status-dot.connected {
    background: #22c55e;
  }
  .status-dot.disconnected {
    background: #ef4444;
  }
  .status-text {
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 12px;
  }

  /* Latency breakdown */
  .latency-section {
    margin: 24px 0;
    padding: 16px;
    border: 1px solid #e5e5e5;
    border-radius: 8px;
    background: #f9f9f9;
  }
  .latency-section h2 {
    margin: 0 0 12px;
    font-size: 13px;
    font-weight: 600;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .breakdown-bar {
    display: flex;
    height: 40px;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #ddd;
    background: #fff;
    gap: 1px;
    margin-bottom: 12px;
  }
  .segment {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    min-width: 60px;
    position: relative;
  }
  .segment.stt {
    background: linear-gradient(135deg, #3b82f6, #2563eb);
  }
  .segment.llm {
    background: linear-gradient(135deg, #8b5cf6, #7c3aed);
  }
  .segment.tts {
    background: linear-gradient(135deg, #ec4899, #db2777);
  }
  .segment.empty {
    background: #e5e5e5;
    color: #999;
    font-weight: normal;
  }
  .latency-total {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 13px;
  }
  .latency-total .label {
    color: #666;
  }
  .latency-total .value {
    font-size: 18px;
    font-weight: 700;
    color: #000;
  }
  .latency-idle {
    font-size: 13px;
    color: #999;
    font-style: italic;
  }

  /* Pipeline stages */
  .stages {
    margin: 24px 0;
    padding: 16px;
    border: 1px solid #e5e5e5;
    border-radius: 8px;
    background: #f9f9f9;
  }
  .stages h2 {
    margin: 0 0 12px;
    font-size: 13px;
    font-weight: 600;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stages-grid {
    display: flex;
    align-items: stretch;
    gap: 6px;
    flex-wrap: wrap;
  }
  .stages-grid .stage-box { flex: 1 1 120px; min-width: 108px; }
  .arrow {
    display: flex;
    align-items: center;
    color: #cbd5e1;
    font-size: 22px;
    font-weight: 700;
    flex: 0 0 auto;
  }
  .stage-box {
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    background: #fff;
    text-align: center;
    transition: all 0.2s ease;
  }
  .stage-box.active {
    border-color: #3b82f6;
    background: #eff6ff;
    box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
  }
  .stage-box .icon {
    font-size: 20px;
    margin-bottom: 6px;
  }
  .stage-box .name {
    font-size: 12px;
    font-weight: 500;
    color: #333;
    margin: 0;
  }
  .stage-box .latency {
    font-size: 11px;
    color: #999;
    margin: 6px 0 0;
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
  }
  .stage-box .latency.value {
    color: #666;
    font-weight: 600;
  }

  /* Event log */
  .log-section {
    margin: 24px 0;
    padding: 16px;
    border: 1px solid #e5e5e5;
    border-radius: 8px;
    background: #f9f9f9;
  }
  .log-section h2 {
    margin: 0 0 12px;
    font-size: 13px;
    font-weight: 600;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .log-table {
    width: 100%;
    border-collapse: collapse;
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    font-size: 12px;
  }
  .log-table thead {
    border-bottom: 2px solid #ddd;
  }
  .log-table th {
    text-align: left;
    padding: 8px;
    font-weight: 600;
    color: #666;
    background: #fff;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .log-table tbody tr {
    border-bottom: 1px solid #eee;
    transition: background-color 0.15s ease;
  }
  .log-table tbody tr:hover {
    background: #f5f5f5;
  }
  .log-table tbody tr.replay {
    opacity: 0.7;
  }
  .log-table td {
    padding: 8px;
    vertical-align: top;
  }
  .log-table .time {
    color: #999;
    white-space: nowrap;
    width: 110px;
  }
  .log-table .delta {
    color: #999;
    white-space: nowrap;
    width: 70px;
  }
  .log-table .stage {
    color: #333;
    white-space: nowrap;
    width: 100px;
    font-weight: 500;
  }
  .log-table .ms {
    color: #666;
    white-space: nowrap;
    width: 70px;
    text-align: right;
  }
  .log-table .text {
    color: #333;
    word-break: break-word;
    max-width: 400px;
  }
  .log-container {
    max-height: 400px;
    overflow-y: auto;
    border: 1px solid #ddd;
    border-radius: 4px;
    background: #fff;
  }
  .log-idle {
    padding: 16px;
    text-align: center;
    color: #999;
    font-style: italic;
  }

  /* Scrollbar styling */
  .log-container::-webkit-scrollbar {
    width: 8px;
  }
  .log-container::-webkit-scrollbar-track {
    background: #f0f0f0;
  }
  .log-container::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 4px;
  }
  .log-container::-webkit-scrollbar-thumb:hover {
    background: #999;
  }
</style>
</head>
<body>

<div class="container">
  <h1>reachy-gemini · pipeline latency profiler</h1>
  <div class="header-sub">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-text" id="statusText">connecting…</span>
  </div>

  <!-- Latency breakdown -->
  <div class="latency-section">
    <h2>Current turn latency</h2>
    <div id="breakdownContainer">
      <div class="latency-idle">waiting for the robot…</div>
    </div>
  </div>

  <!-- Pipeline stages -->
  <div class="stages">
    <h2>Pipeline stages</h2>
    <div class="stages-grid">
      <div class="stage-box" data-stage="listening">
        <div class="icon">🎤</div>
        <p class="name">Listening</p>
        <div class="latency">idle</div>
      </div>
      <span class="arrow">→</span>
      <div class="stage-box" data-stage="speak">
        <div class="icon">👂</div>
        <p class="name">You speak</p>
        <div class="latency">—</div>
      </div>
      <span class="arrow">→</span>
      <div class="stage-box" data-stage="stt">
        <div class="icon">📝</div>
        <p class="name">STT</p>
        <div class="latency">—</div>
      </div>
      <span class="arrow">→</span>
      <div class="stage-box" data-stage="llm">
        <div class="icon">🧠</div>
        <p class="name">LLM</p>
        <div class="latency">—</div>
      </div>
      <span class="arrow">→</span>
      <div class="stage-box" data-stage="tts">
        <div class="icon">🔊</div>
        <p class="name">TTS</p>
        <div class="latency">—</div>
      </div>
      <span class="arrow">→</span>
      <div class="stage-box" data-stage="total">
        <div class="icon">🏁</div>
        <p class="name">Total</p>
        <div class="latency">—</div>
      </div>
    </div>
  </div>

  <!-- Event log -->
  <div class="log-section">
    <h2>Event log</h2>
    <div class="log-container" id="logContainer">
      <div class="log-idle">waiting for the robot…</div>
    </div>
  </div>
</div>

<script>
// Constants
const STAGE_ICONS = {
  listening: '🎤',
  hearing: '👂',
  transcribing: '📝',
  transcribed: '✓',
  thinking: '🧠',
  reply: '💬',
  speaking: '🔊',
  done: '🏁',
  error: '⚠'
};

// State
let live = false;
let lastT = null;
let turnT0 = null;
let lastStage = null;
let lastRowElement = null;
let rowAccumText = '';
let hasEvents = false;

// Current turn latencies for breakdown
function freshTurn() {
  return { speakLatency: null, sttLatency: null, llmLatency: null,
           ttsLatency: null, totalLatency: null };
}
let currentTurn = freshTurn();
let hearingT = null;  // wall-clock (ms) when the mic opened, to measure talk duration

// event stage -> which box it lights up / writes its latency to
const STAGE_TO_BOX = {
  listening: 'listening', hearing: 'speak', transcribing: 'speak',
  transcribed: 'stt', thinking: 'llm', reply: 'llm', speaking: 'tts',
  done: 'total', error: null
};
// box -> currentTurn field, for the heatmap
const BOX_FIELD = { speak: 'speakLatency', stt: 'sttLatency', llm: 'llmLatency', tts: 'ttsLatency' };

function updateStatusDot(connected) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (connected) {
    dot.classList.add('connected');
    dot.classList.remove('disconnected');
    text.textContent = '● connected';
    text.style.color = '#22c55e';
  } else {
    dot.classList.add('disconnected');
    dot.classList.remove('connected');
    text.textContent = '⚠ disconnected';
    text.style.color = '#ef4444';
  }
}

function formatTime(ms) {
  const date = new Date(ms);
  const hours = String(date.getHours()).padStart(2, '0');
  const minutes = String(date.getMinutes()).padStart(2, '0');
  const seconds = String(date.getSeconds()).padStart(2, '0');
  const millis = String(date.getMilliseconds()).padStart(3, '0');
  return `${hours}:${minutes}:${seconds}.${millis}`;
}

function updateBreakdownBar() {
  const container = document.getElementById('breakdownContainer');
  const stt = currentTurn.sttLatency;
  const llm = currentTurn.llmLatency;
  const tts = currentTurn.ttsLatency;
  const total = currentTurn.totalLatency;

  if (total === null) {
    container.innerHTML = '<div class="latency-idle">waiting for the robot…</div>';
    return;
  }

  let barHtml = '<div class="breakdown-bar">';

  const segments = [];
  if (stt !== null) segments.push({ ms: stt, label: `STT ${stt}ms`, class: 'stt', width: stt });
  if (llm !== null) segments.push({ ms: llm, label: `LLM ${llm}ms`, class: 'llm', width: llm });
  if (tts !== null) segments.push({ ms: tts, label: `TTS ${tts}ms`, class: 'tts', width: tts });

  if (segments.length === 0) {
    barHtml += '<div class="segment empty">no latency data yet</div>';
  } else {
    const totalWidth = segments.reduce((sum, s) => sum + s.width, 0);
    for (const seg of segments) {
      const pct = totalWidth > 0 ? ((seg.width / totalWidth) * 100).toFixed(1) : 0;
      barHtml += `<div class="segment ${seg.class}" style="flex: ${seg.width}; min-width: auto;">${seg.label}</div>`;
    }
  }

  barHtml += '</div>';

  if (total !== null) {
    barHtml += `<div class="latency-total">
      <span class="label">Total latency (voice start → reply start):</span>
      <span class="value">${total} ms</span>
    </div>`;
  }

  container.innerHTML = barHtml;
}

function setBoxLatency(box, ms) {
  if (ms === null || ms === undefined) return;
  const el = document.querySelector(`.stage-box[data-stage="${box}"] .latency`);
  if (!el) return;
  el.textContent = `${ms} ms`;
  el.classList.add('value');
}

function highlightStage(stage) {
  document.querySelectorAll('.stage-box').forEach(box => box.classList.remove('active'));
  const target = STAGE_TO_BOX[stage];
  if (target) {
    const box = document.querySelector(`.stage-box[data-stage="${target}"]`);
    if (box) box.classList.add('active');
  }
}

// Colour the timed boxes by speed: slowest = red, fastest = green, gradient between.
// Recomputed each completed turn so the bottleneck is obvious at a glance.
function applyHeatmap() {
  const boxes = ['speak', 'stt', 'llm', 'tts'];
  const vals = boxes.map(b => currentTurn[BOX_FIELD[b]]).filter(v => typeof v === 'number');
  if (vals.length < 2) return;
  const min = Math.min(...vals), max = Math.max(...vals);
  boxes.forEach(b => {
    const v = currentTurn[BOX_FIELD[b]];
    const box = document.querySelector(`.stage-box[data-stage="${b}"]`);
    if (!box || typeof v !== 'number') return;
    const frac = max > min ? (v - min) / (max - min) : 0;
    const hue = Math.round(120 * (1 - frac));  // 120=green (fast) -> 0=red (slow)
    box.style.borderColor = `hsl(${hue},70%,45%)`;
    box.style.background = `hsl(${hue},75%,96%)`;
    const lat = box.querySelector('.latency');
    if (lat) { lat.style.color = `hsl(${hue},70%,36%)`; lat.style.fontWeight = '700'; }
  });
}

function clearHeatmap() {
  document.querySelectorAll('.stages-grid .stage-box').forEach(box => {
    box.style.borderColor = '';
    box.style.background = '';
    const lat = box.querySelector('.latency');
    if (lat) { lat.style.color = ''; lat.style.fontWeight = ''; }
  });
}

function formatText(text) {
  return (text + '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function addLogRow(stage, text, deltaMs, ms, t, isReplay) {
  const container = document.getElementById('logContainer');

  // Clear idle message on first event
  if (!hasEvents) {
    hasEvents = true;
    container.innerHTML = '<table class="log-table"><thead><tr>' +
      '<th class="time">Time</th>' +
      '<th class="delta">Δ</th>' +
      '<th class="stage">Stage</th>' +
      '<th class="ms">ms</th>' +
      '<th class="text">Details</th>' +
      '</tr></thead><tbody id="logBody"></tbody></table>';
  }

  const tbody = document.getElementById('logBody');
  if (!tbody) return;

  const row = document.createElement('tr');
  if (isReplay) row.classList.add('replay');

  const timeStr = formatTime(t || Date.now());
  const deltaStr = deltaMs !== null && deltaMs !== undefined ? `+${deltaMs} ms` : '—';
  const icon = STAGE_ICONS[stage] || '·';
  const stageStr = `${icon} ${stage}`;
  const msStr = (ms !== null && ms !== undefined) ? `${ms} ms` : '';

  row.innerHTML = `
    <td class="time">${timeStr}</td>
    <td class="delta">${deltaStr}</td>
    <td class="stage">${stageStr}</td>
    <td class="ms">${msStr}</td>
    <td class="text">${formatText(text)}</td>
  `;

  tbody.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function onLiveEvent(eventData, isReplay) {
  let stage = eventData.stage;
  let text = eventData.text || '';
  let ms = eventData.ms;
  let t = eventData.t;

  if (!t) t = Date.now();

  const deltaMs = lastT === null ? null : Math.round(t - lastT);
  lastT = t;

  // Reset for the new turn only when you START SPEAKING again (`hearing`), NOT on
  // `listening`. That keeps the previous turn's numbers + heatmap colours on screen
  // through the whole idle wait, so you have time to read them; the loop is already
  // listening in the background and clears the moment your next utterance begins.
  if (stage === 'hearing') {
    currentTurn = freshTurn();
    hearingT = t;
    clearHeatmap();
    document.querySelectorAll('.stages-grid .stage-box[data-stage] .latency').forEach(el => {
      if (el.closest('.stage-box').dataset.stage !== 'listening') {
        el.textContent = '—'; el.classList.remove('value');
      }
    });
  }

  // Each stage writes its EXACT latency into its own box.
  if (stage === 'transcribing' && hearingT !== null) {
    currentTurn.speakLatency = Math.max(0, Math.round(t - hearingT));  // how long you talked
    setBoxLatency('speak', currentTurn.speakLatency);
  } else if (stage === 'transcribed' && typeof ms === 'number') {
    currentTurn.sttLatency = ms; setBoxLatency('stt', ms);
  } else if (stage === 'reply' && typeof ms === 'number') {
    currentTurn.llmLatency = ms; setBoxLatency('llm', ms);
  } else if (stage === 'speaking' && typeof ms === 'number') {
    currentTurn.ttsLatency = ms; setBoxLatency('tts', ms);
  } else if (stage === 'done' && typeof ms === 'number') {
    currentTurn.totalLatency = ms; setBoxLatency('total', ms);
  }

  if (!isReplay) {
    live = true;
    highlightStage(stage);
    if (stage === 'done') {
      applyHeatmap();                              // colour slowest red / fastest green
      setTimeout(() => highlightStage(null), 800);
    }
  } else if (stage === 'done') {
    applyHeatmap();                                // colour the replayed last turn too
  }

  updateBreakdownBar();
  addLogRow(stage, text, deltaMs, ms, t, isReplay);
}

// Connect to SSE
function connectLive() {
  if (typeof EventSource === 'undefined') {
    updateStatusDot(false);
    return;
  }

  try {
    const es = new EventSource('/events');

    es.onopen = function() {
      updateStatusDot(true);
      if (!live) {
        live = true;
      }
    };

    es.onmessage = function(event) {
      try {
        const data = JSON.parse(event.data);
        onLiveEvent(data, false);
      } catch (e) {
        // Silently ignore malformed events
      }
    };

    es.addEventListener('replay', function(event) {
      try {
        const data = JSON.parse(event.data);
        onLiveEvent(data, true);
      } catch (e) {
        // Silently ignore malformed events
      }
    });

    es.onerror = function() {
      if (live) {
        updateStatusDot(false);
      }
    };

  } catch (e) {
    // SSE not available (e.g., file://)
    updateStatusDot(false);
  }
}

// Initialize
window.addEventListener('DOMContentLoaded', connectLive);
</script>

</body>
</html>
