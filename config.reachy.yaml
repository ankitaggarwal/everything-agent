# Deployment config for the real Reachy Mini Wireless.
# Run with:  EVERYTHING_AGENT_CONFIG=config.reachy.yaml python -m everything_agent
#
# v1 (interactive voice): always-listening mic -> Cartesia Ink-Whisper STT ->
# Haiku router -> Cartesia Sonic voice + real head/antenna movement.
# ("Hey Reachy" wake-word gating and the Claude-SDK tool brain come next.)

hearing:
  wakeword:
    # TEMPORARY (testing): always-listening, no wake word -- just talk and it
    # responds. The pre-trained acoustic model misses the household voices, so
    # we use this until the CUSTOM-trained "reachy" model (HF Jobs) is ready,
    # then switch back to:  backend: openwakeword / model_path: models/<custom>.onnx
    backend: mock
    model_path: models/hey_reachy.onnx
    threshold: 0.5
    phrase: "reachy"
  stt:
    backend: cartesia        # Cartesia Ink-Whisper streaming (uses CARTESIA_API_KEY)
    model: ink-whisper
    language: en
    timeout: 30
    end_gap: 1.3             # wait this long after you stop talking before replying
                            # -- bigger = more patient, won't jump in on fragments
  # No text address gate: the acoustic wake word above is the gate now, so once
  # woken we act on whatever you say (no need to repeat the name in the command).
  trigger: ""
  # After a reply, keep listening WITHOUT re-waking for this many seconds, so a
  # conversation flows naturally (say "Reachy" once, then just keep talking).
  followup_window: 30

brain:
  router:
    backend: anthropic       # real Tier-1 reflex (Haiku) -- needs ANTHROPIC_API_KEY
    model: claude-haiku-4-5
  agent:
    # haiku = real conversation, no tools (a stopgap; can bluff about actions).
    # claude_sdk = the real tool-using brain (local modules + MCP servers +
    #   approval gate). Needs Node + Claude Code CLI + `claude login` on the robot.
    #   Note: this key's workspace caps Opus at 0 rpm, so the CLI auths via your
    #   Claude subscription; keep model at a tier your login allows.
    # fast = low-latency direct-API tool calling (Haiku, no subprocess) -- snappy.
    # claude_sdk = full Agent SDK + MCP (auth: login -> Opus) but spawns a CLI each
    #   turn (seconds slower); switch to it when you need MCP servers.
    backend: fast
    model: claude-haiku-4-5
    web_search: false        # native server-side search off; we use the free Tavily module instead
    reply_pause: 0.6         # take a brief beat before answering (feels less jumpy)
    personality: |
      You are Reachy, a cheerful, playful little desk robot talking to a small child.
      - CRITICAL: reply in ONE short sentence, usually under 12 words. Snappy and fun.
        Never list options or stack questions. A quick joke or a single question is great.
      - Upbeat, warm, silly-in-a-fun-way. Simple kid words. Never dry or corporate.
      - If you only caught a garbled fragment, cheerfully say "Ooh, say that again?"
      - If you can't do something, say so happily in a few words and move on.
      - You have a head and antennas: react with ONE emotion gesture, then speak --
        never narrate the movement.
    # auth: login            # only for claude_sdk; uses CLAUDE_CODE_OAUTH_TOKEN
    mcp_servers: {}          # e.g. telegram/clio -- see ROADMAP Phase 3 (claude_sdk only)

express:
  tts:
    backend: cartesia        # Cartesia Sonic -> robot speaker
    model: sonic-3           # Cartesia's most natural model
    voice_id: a33f7a4c-100f-41cf-a1fd-5822e8fc253f   # "Lauren - Lively Narrator" (expressive, fun, kid-friendly)
    language: en
  barge_in:                  # "just talk to interrupt" -- echo-robust: transcribes
    enabled: true            # the mic during playback and ignores the robot's own
    mode: transcript         # words, so it won't self-interrupt despite no AEC.
    grace_ms: 400

robot:
  backend: reachy_mini       # real hardware via the on-board daemon

# Settings webpage -- reachable from Mac Safari at http://192.168.1.29:8080
web:
  enabled: true
  host: 0.0.0.0
  port: 8080

memory:
  backend: simple
  path: memory.json

approval:
  auto_approve: true         # headless on the robot (no console to confirm)

modules:
  - idle
  - system_time
  - emotions               # physical emotion tools the brain uses to express itself
  - weather                # keyless Open-Meteo current conditions + forecast
  - timers                 # countdown timers + reminders, spoken aloud when due
  - web_search             # current info / news via Tavily (free tier, TAVILY_API_KEY)

# Default place for "what's the weather?" with no city named. Guessed from the
# robot's BST timezone -- change it on the settings page or here.
weather:
  default_location: "London"
  units: celsius           # celsius | fahrenheit

providers:
  cartesia:
    enabled: false           # TTS/STT adapters read CARTESIA_API_KEY directly
